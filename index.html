<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart JSON Morph</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/lucide-icons/lucide/icons/file-json.svg" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #fallback-ui {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
        text-align: center;
      }
      .loader {
        width: 24px;
        height: 24px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #000000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .hidden { display: none !important; }
      #error-ui {
        background: #fff;
        color: #000;
        padding: 40px 20px;
        display: none;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fallback-ui">
        <div class="loader"></div>
        <h2 style="font-size: 18px; font-weight: 700; margin: 0 0 4px 0;">Smart JSON Morph</h2>
        <p style="font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Initializing System...</p>
      </div>
    </div>
    
    <div id="error-ui">
      <h2 style="font-size: 20px; font-weight: 700;">Initialization Error</h2>
      <p style="color: #666; font-size: 14px; margin-bottom: 24px;">The application failed to load. Please try refreshing.</p>
      <button onclick="location.reload()" style="background: #000; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600;">Refresh Page</button>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(msg, url, line) {
        document.getElementById('fallback-ui')?.classList.add('hidden');
        document.getElementById('error-ui').style.display = 'flex';
        console.error('Global error:', msg, url, line);
        return false;
      };
      
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Force reload on update to prevent version conflicts
                    window.location.reload();
                  }
                };
              };
            })
            .catch(err => console.log('SW registration failed', err));
        });
      }
    </script>
  </body>
</html>
